<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Amministratore locale · Giochi</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <main class="main-content">
      <header class="topbar">
        <div class="page-title">
          <h1>Giochi del locale</h1>
          <p>Installa giochi del catalogo e avvia partite individuali oppure a squadre.</p>
        </div>
        <span id="user-badge" class="badge user-badge"></span>
      </header>

      <section class="panel">
        <div class="panel-title">
          <h2>Nuovo gioco</h2>
        </div>
        <form id="game-form" class="form-grid">
          <div class="field">
            <label for="game-name">Nome</label>
            <input id="game-name" name="name" required>
          </div>
          <div class="field">
            <label for="game-type">Tipo</label>
            <input id="game-type" name="type" placeholder="Scegli uno sticker o scrivi un tipo" required>
          </div>
          <div class="field">
            <label for="game-status">Stato</label>
            <select id="game-status" name="status">
              <option>ONLINE</option>
              <option>OFFLINE</option>
              <option>SYNC_PENDING</option>
            </select>
          </div>
          <div class="type-stickers" aria-label="Sticker tipo gioco">
            <button class="type-sticker" type="button" data-game-type="Calciobalilla">Calciobalilla</button>
            <button class="type-sticker" type="button" data-game-type="Freccette">Freccette</button>
            <button class="type-sticker" type="button" data-game-type="Bocce">Bocce</button>
            <button class="type-sticker" type="button" data-game-type="Monopoli">Monopoli</button>
          </div>
          <button class="btn" type="submit">Crea gioco</button>
        </form>
      </section>

      <section style="margin-top: 18px;">
        <div class="panel-title">
          <h2>Giochi</h2>
        </div>
        <div id="local-games-grid" class="game-grid"></div>
      </section>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/games.js"></script>
  <script src="js/local-admin.js"></script>
</body>
</html>
