<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PlayConnect - Tornei</title><link rel="stylesheet" href="css/style.css"></head><body><div class="app-shell"><aside id="sidebar"></aside><main class="main-content"><header class="topbar"><div class="page-title"><h1>Tornei</h1><p>Un torneo riguarda un tipo di gioco, uno o piu locali e partite individuali oppure a squadre.</p></div><span id="user-badge" class="badge user-badge"></span></header><section id="platform-tournament-form" class="panel" style="display:none"><div class="panel-title"><h2>Crea torneo completo</h2><span class="badge">Amministratore piattaforma</span></div><form id="tournament-form" class="form-grid three"><div class="field"><label>Nome</label><input name="name" required></div><div class="field"><label>Tipo gioco</label><select name="game_type_id" id="tournament-game-type" required></select></div><div class="field"><label>Modalita</label><select name="participant_mode" id="tournament-mode"><option value="INDIVIDUAL">Individuale</option><option value="TEAM">Squadre</option></select></div><div class="field"><label>Stato</label><select name="status"><option>DRAFT</option><option>ACTIVE</option><option>FINISHED</option></select></div><div class="field"><label>Data inizio</label><input name="start_date" type="date"></div><div class="field"><label>Data fine</label><input name="end_date" type="date"></div><div class="field"><label>Locali coinvolti</label><select id="tournament-locales" multiple size="4" required></select></div><div class="field"><label>Squadre (solo modalita TEAM)</label><select id="tournament-teams" multiple size="4"></select></div><button class="btn" type="submit">Crea torneo</button></form><div id="tournament-message"></div></section><section id="link-match-panel" class="panel" style="display:none;margin-top:18px"><div class="panel-title"><h2>Calendario: collega partita conclusa</h2></div><form id="link-match-form" class="form-grid three"><div class="field"><label>Torneo</label><select name="tournament_id" id="link-tournament-id"></select></div><div class="field"><label>Partita</label><select name="match_id" id="link-match-id"></select></div><div class="field"><label>Turno</label><input name="round_number" type="number" min="1" value="1"></div><div class="field"><label>Data prevista</label><input name="scheduled_at" type="datetime-local"></div><button class="btn secondary" type="submit">Collega al calendario</button></form></section><section class="panel" style="margin-top:18px"><div class="panel-title"><h2>Lista tornei</h2><span class="badge mqtt-badge">Classifica automatica</span></div><div id="tournaments-list" class="grid cards"></div></section><section class="panel" style="margin-top:18px"><div class="panel-title"><h2>Dettaglio, calendario e classifica</h2></div><div id="tournament-detail"></div></section></main></div><script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/tournaments.js"></script></body></html>
