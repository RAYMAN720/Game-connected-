<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PlayConnect - Amministratore gioco</title><link rel="stylesheet" href="css/style.css"></head><body><div class="app-shell"><aside id="sidebar"></aside><main class="main-content"><header class="topbar"><div class="page-title"><h1>Tipi di gioco e regole</h1><p>Definisci un nuovo gioco, gli eventi che produce e i modelli dei sensori.</p></div><span id="user-badge" class="badge user-badge"></span></header><section class="panel"><div class="panel-title"><h2>Nuovo tipo di gioco</h2><span class="badge">Ruolo richiesto dal progetto</span></div><form id="game-type-form" class="form-grid three"><input type="hidden" name="id" id="editing-game-type-id"><div class="field"><label>Nome</label><input name="name" required placeholder="Calciobalilla"></div><div class="field"><label>Descrizione</label><input name="description" required placeholder="Goal tramite sensori sulle porte"></div><div class="field"><label>Limite punteggio</label><input name="score_limit" type="number" min="1" placeholder="5"></div><div class="field"><label>Evento inizio</label><input name="start_event" value="MATCH_START"></div><div class="field"><label>Evento punto 1</label><input name="score_event_player1" value="GOAL_PLAYER_1"></div><div class="field"><label>Evento punto 2</label><input name="score_event_player2" value="GOAL_PLAYER_2"></div><div class="field"><label>Evento fine</label><input name="end_event" value="MATCH_END"></div><div class="field"><label>Supporta squadre</label><select name="supports_teams"><option value="true">Si</option><option value="false">No</option></select></div><div class="actions"><button class="btn" id="save-type-btn" type="submit">Crea tipo</button><button class="btn secondary hidden" id="cancel-type-edit" type="button">Annulla modifica</button></div></form><div id="type-message"></div></section><section class="panel" style="margin-top:18px"><div class="panel-title"><h2>Tipi configurati</h2><span class="badge mqtt-badge">Regole sensori</span></div><div id="game-types-list" class="grid cards"></div></section><section class="panel" style="margin-top:18px"><div class="panel-title"><h2>Modelli sensore del tipo selezionato</h2></div><form id="template-form" class="form-grid three"><input type="hidden" name="game_type_id" id="selected-game-type-id"><div class="field"><label>Nome sensore</label><input name="name" required placeholder="Sensore porta"></div><div class="field"><label>Evento prodotto</label><input name="event_type" required placeholder="GOAL_PLAYER_1"></div><div class="field"><label>Descrizione</label><input name="description" required placeholder="Aggiunge un punto"></div><button class="btn secondary" type="submit">Aggiungi modello</button></form><div id="templates-list"></div></section></main></div><script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/game-admin.js"></script></body></html>
