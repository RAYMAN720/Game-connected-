<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client · Statistiche</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <main class="main-content">
      <header class="topbar">
        <div class="page-title">
          <h1>Statistiche giocatore</h1>
          <p>Partite personali e classifica globale basata su vittorie e goal.</p>
        </div>
        <span id="user-badge" class="badge user-badge"></span>
      </header>

      <section class="grid two-columns">
        <div class="panel">
          <div class="panel-title">
            <h2>Classifica</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Giocatore</th>
                  <th>Vittorie</th>
                  <th>Goal</th>
                </tr>
              </thead>
              <tbody id="client-ranking-body"></tbody>
            </table>
          </div>
        </div>
        <div class="panel">
          <div class="panel-title">
            <h2>Partite recenti</h2>
          </div>
          <div id="client-stat-recent"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/games.js"></script>
  <script src="js/statistics.js"></script>
  <script src="js/client.js"></script>
</body>
</html>
