<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Amministratore piattaforma · Statistiche</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <main class="main-content">
      <header class="topbar">
        <div class="page-title">
          <h1>Statistiche globali</h1>
          <p>Totali della piattaforma, locale piu attivo, gioco piu usato e partite recenti.</p>
        </div>
        <span id="user-badge" class="badge user-badge"></span>
      </header>

      <section id="global-stat-cards" class="grid cards"></section>

      <section class="grid two-columns" style="margin-top: 18px;">
        <div class="panel">
          <div class="panel-title">
            <h2>Partite recenti</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Gioco</th>
                  <th>Locale</th>
                  <th>Punteggio</th>
                  <th>Stato</th>
                  <th>Vincitore</th>
                  <th>Inizio</th>
                </tr>
              </thead>
              <tbody id="global-recent-body"></tbody>
            </table>
          </div>
        </div>
        <div class="panel">
          <div class="panel-title">
            <h2>In evidenza</h2>
          </div>
          <div id="global-highlights" class="grid"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/games.js"></script>
  <script src="js/statistics.js"></script>
  <script src="js/platform-admin.js"></script>
</body>
</html>
