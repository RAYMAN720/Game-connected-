<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PlayConnect - Utenti</title><link rel="stylesheet" href="css/style.css"></head><body><div class="app-shell"><aside id="sidebar"></aside><main class="main-content"><header class="topbar"><div class="page-title"><h1>Gestione utenti</h1><p>L'amministratore piattaforma crea e controlla tutti i ruoli.</p></div><span id="user-badge" class="badge user-badge"></span></header><section class="panel"><div class="panel-title"><h2>Crea utente</h2></div><form id="user-form" class="form-grid three"><div class="field"><label>Ruolo</label><select name="role" id="new-user-role"><option value="LOCAL_ADMIN">Amministratore locale</option><option value="GAME_ADMIN">Amministratore gioco</option><option value="CLIENT">Giocatore</option></select></div><div class="field"><label>Username</label><input name="username" required></div><div class="field"><label>Password</label><input name="password" required></div><div class="field" id="new-user-locale-field"><label>Locale</label><select name="locale_id" id="new-user-locale"></select></div><button class="btn" type="submit">Crea utente</button></form><div id="user-message"></div></section><section class="panel" style="margin-top:18px"><div class="panel-title"><h2>Utenti registrati</h2></div><div id="users-table" class="table-wrap"></div></section></main></div><script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/platform-users.js"></script></body></html>
