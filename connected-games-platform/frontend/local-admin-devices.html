<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PlayConnect - Edge</title><link rel="stylesheet" href="css/style.css"></head><body><div class="app-shell"><aside id="sidebar"></aside><main class="main-content"><header class="topbar"><div class="page-title"><h1>Edge, sensori e attuatori</h1><p>Configura i dispositivi fisici o simulati presenti nel locale.</p></div><span id="user-badge" class="badge user-badge"></span></header><section class="panel"><div class="panel-title"><h2>Nuovo dispositivo edge</h2><a class="btn secondary" href="http://localhost:8090" target="_blank">Apri interfaccia locale edge</a></div><form id="device-form" class="form-grid three"><div class="field"><label>Nome</label><input name="name" required placeholder="Edge locale 02"></div><div class="field"><label>Stato iniziale</label><select name="status"><option>OFFLINE</option><option>ONLINE</option></select></div><button class="btn" type="submit">Crea edge</button></form><div id="devices-list" class="grid cards" style="margin-top:15px"></div></section><section class="panel" style="margin-top:18px"><div class="panel-title"><h2>Nuovo sensore</h2></div><form id="sensor-form" class="form-grid three"><div class="field"><label>Edge</label><select name="edge_device_id" id="sensor-device" required></select></div><div class="field"><label>Gioco</label><select name="game_id" id="sensor-game" required></select></div><div class="field"><label>Nome</label><input name="name" required></div><div class="field"><label>Evento</label><input name="sensor_type" required placeholder="GOAL_PLAYER_1"></div><div class="field"><label>Topic MQTT</label><input name="mqtt_topic" placeholder="automatico"></div><button class="btn" type="submit">Aggiungi sensore</button></form><div id="sensors-list" class="table-wrap" style="margin-top:15px"></div></section><section class="panel" style="margin-top:18px"><div class="panel-title"><h2>Nuovo attuatore</h2></div><form id="actuator-form" class="form-grid three"><div class="field"><label>Edge</label><select name="edge_device_id" id="actuator-device" required></select></div><div class="field"><label>Gioco</label><select name="game_id" id="actuator-game" required></select></div><div class="field"><label>Nome</label><input name="name" required></div><div class="field"><label>Tipo</label><select name="actuator_type"><option>SCOREBOARD</option><option>LED</option><option>BUZZER</option></select></div><button class="btn" type="submit">Aggiungi attuatore</button></form><div id="actuators-list" class="table-wrap" style="margin-top:15px"></div></section></main></div><script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/devices.js"></script></body></html>
