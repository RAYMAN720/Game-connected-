<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PlayConnect - Sensori</title><link rel="stylesheet" href="css/style.css"></head><body><div class="app-shell"><aside id="sidebar"></aside><main class="main-content"><header class="topbar"><div class="page-title"><h1>Sensori e attuatori installati</h1><p>Controllo semplice delle configurazioni associate ai giochi.</p></div><span id="user-badge" class="badge user-badge"></span></header><section class="panel"><div class="panel-title"><h2>Nuovo sensore</h2></div><form id="sensor-form" class="form-grid three"><div class="field"><label>Dispositivo edge</label><select name="edge_device_id" id="sensor-device" required></select></div><div class="field"><label>Gioco</label><select name="game_id" id="sensor-game" required></select></div><div class="field"><label>Nome</label><input name="name" required></div><div class="field"><label>Evento</label><input name="sensor_type" required placeholder="GOAL_PLAYER_1"></div><div class="field"><label>Topic MQTT</label><input name="mqtt_topic" placeholder="generato automaticamente"></div><button class="btn" type="submit">Aggiungi sensore</button></form></section><section class="panel" style="margin-top:18px"><div class="panel-title"><h2>Sensori</h2></div><div id="sensors-list" class="table-wrap"></div></section><section class="panel" style="margin-top:18px"><div class="panel-title"><h2>Attuatori</h2></div><div id="actuators-list" class="table-wrap"></div></section></main></div><script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/devices.js"></script></body></html>
