openapi: 3.0.3
info:
  title: PlayConnect API
  version: 2.1.0
  description: API REST della piattaforma PlayConnect con regole di gioco configurabili, MQTT e sincronizzazione
    offline.
servers:
- url: http://localhost:3000/api
components:
  securitySchemes:
    UserId:
      type: apiKey
      in: header
      name: X-User-Id
  schemas:
    Login:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
        password:
          type: string
    GameType:
      type: object
      required:
      - name
      - description
      properties:
        name:
          type: string
        description:
          type: string
        start_event:
          type: string
          default: MATCH_START
        score_event_player1:
          type: string
          default: GOAL_PLAYER_1
        score_event_player2:
          type: string
          default: GOAL_PLAYER_2
        end_event:
          type: string
          default: MATCH_END
        score_limit:
          type: integer
          nullable: true
        supports_teams:
          type: boolean
    MatchStart:
      type: object
      required:
      - game_id
      - participant_mode
      properties:
        game_id:
          type: integer
        participant_mode:
          type: string
          enum:
          - INDIVIDUAL
          - TEAM
        player1_name:
          type: string
        player2_name:
          type: string
        team1_id:
          type: integer
        team2_id:
          type: integer
    Tournament:
      type: object
      required:
      - name
      - game_type_id
      - participant_mode
      - locale_ids
      properties:
        name:
          type: string
        game_type_id:
          type: integer
        participant_mode:
          type: string
          enum:
          - INDIVIDUAL
          - TEAM
        status:
          type: string
          enum:
          - DRAFT
          - ACTIVE
          - FINISHED
        locale_ids:
          type: array
          items:
            type: integer
        team_ids:
          type: array
          items:
            type: integer
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
    MatchEvent:
      type: object
      required:
      - event_type
      properties:
        event_uuid:
          type: string
          description: Identificatore univoco usato per evitare duplicati
        event_type:
          type: string
          description: Nome dell evento configurato nel tipo di gioco
        player_name:
          type: string
          nullable: true
        description:
          type: string
        value:
          type: integer
          minimum: 1
          description: Punti prodotti dal sensore. Se assente vale 1
        created_at:
          type: string
          format: date-time
        sync_status:
          type: string
          enum:
          - PENDING
          - SYNCED
          - FAILED
security:
- UserId: []
paths:
  /health:
    get:
      security: []
      summary: Stato gateway e microservizi
      responses:
        '200':
          description: Sistema online
        '503':
          description: Sistema degradato
  /auth/login:
    post:
      security: []
      summary: Login demo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
      responses:
        '200':
          description: Utente autenticato
        '401':
          description: Credenziali errate
  /users:
    get:
      summary: Lista utenti visibile al ruolo
      responses:
        '200':
          description: Lista utenti
  /users/local-admin:
    post:
      summary: Crea amministratore locale
      responses:
        '201':
          description: Creato
  /users/game-admin:
    post:
      summary: Crea amministratore del gioco
      responses:
        '201':
          description: Creato
  /users/client:
    post:
      summary: Crea giocatore
      responses:
        '201':
          description: Creato
  /users/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    put:
      summary: Modifica utente
      responses:
        '200':
          description: Modificato
    delete:
      summary: Elimina utente
      responses:
        '200':
          description: Eliminato
  /locales:
    get:
      summary: Lista locali
      responses:
        '200':
          description: Lista
    post:
      summary: Crea locale
      responses:
        '201':
          description: Creato
  /locales/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    put:
      summary: Modifica locale
      responses:
        '200':
          description: Modificato
    delete:
      summary: Elimina locale
      responses:
        '200':
          description: Eliminato
  /game-types:
    get:
      summary: Lista tipi di gioco
      responses:
        '200':
          description: Lista
    post:
      summary: Crea tipo di gioco
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameType'
      responses:
        '201':
          description: Creato
  /game-types/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Dettaglio tipo e modelli sensore
      responses:
        '200':
          description: Dettaglio
    put:
      summary: Modifica tipo
      responses:
        '200':
          description: Modificato
    delete:
      summary: Elimina tipo non usato
      responses:
        '200':
          description: Eliminato
  /game-types/{id}/sensor-templates:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Crea modello sensore
      responses:
        '201':
          description: Creato
  /game-types/{id}/sensor-templates/{templateId}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    - name: templateId
      in: path
      required: true
      schema:
        type: integer
    delete:
      summary: Elimina modello sensore
      responses:
        '200':
          description: Eliminato
  /games:
    get:
      summary: Lista giochi filtrata per ruolo
      responses:
        '200':
          description: Lista
    post:
      summary: Installa gioco in un locale
      responses:
        '201':
          description: Creato
  /games/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    put:
      summary: Modifica gioco
      responses:
        '200':
          description: Modificato
    delete:
      summary: Elimina gioco
      responses:
        '200':
          description: Eliminato
  /devices:
    get:
      summary: Lista dispositivi edge
      responses:
        '200':
          description: Lista
    post:
      summary: Crea dispositivo edge
      responses:
        '201':
          description: Creato
  /devices/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    put:
      summary: Modifica edge
      responses:
        '200':
          description: Modificato
    delete:
      summary: Elimina edge
      responses:
        '200':
          description: Eliminato
  /sensors:
    get:
      summary: Lista sensori
      responses:
        '200':
          description: Lista
    post:
      summary: Crea sensore
      responses:
        '201':
          description: Creato
  /sensors/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    put:
      summary: Modifica sensore
      responses:
        '200':
          description: Modificato
    delete:
      summary: Elimina sensore
      responses:
        '200':
          description: Eliminato
  /actuators:
    get:
      summary: Lista attuatori e stato
      responses:
        '200':
          description: Lista
    post:
      summary: Crea attuatore
      responses:
        '201':
          description: Creato
  /actuators/{id}/state:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Imposta stato manuale attuatore
      responses:
        '200':
          description: Aggiornato
  /matches:
    get:
      summary: Lista partite filtrata per ruolo
      responses:
        '200':
          description: Lista
  /matches/current:
    get:
      summary: Partita live visibile
      responses:
        '200':
          description: Partita o null
  /matches/start:
    post:
      summary: Avvia partita individuale o a squadre
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchStart'
      responses:
        '201':
          description: Partita creata
  /matches/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Dettaglio partita ed eventi
      responses:
        '200':
          description: Dettaglio
  /matches/{id}/events:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Elabora un evento usando le regole del tipo di gioco
      responses:
        '201':
          description: Evento elaborato
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchEvent'
  /matches/{id}/simulate-mqtt:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Chiede all'edge di simulare la partita
      responses:
        '202':
          description: Simulazione avviata
  /matches/{id}/end:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Termina partita
      responses:
        '200':
          description: Terminata
  /teams:
    get:
      summary: Lista squadre e membri
      responses:
        '200':
          description: Lista
    post:
      summary: Crea squadra
      responses:
        '201':
          description: Creata
  /teams/{id}/members:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Aggiunge membro
      responses:
        '201':
          description: Aggiunto
  /teams/{id}/members/{userId}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    - name: userId
      in: path
      required: true
      schema:
        type: integer
    delete:
      summary: Rimuove membro
      responses:
        '200':
          description: Rimosso
  /teams/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    delete:
      summary: Elimina squadra
      responses:
        '200':
          description: Eliminata
  /tournaments:
    get:
      summary: Lista tornei con locali e classifica
      responses:
        '200':
          description: Lista
    post:
      summary: Crea torneo multi-locale
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tournament'
      responses:
        '201':
          description: Creato
  /tournaments/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Dettaglio, calendario e classifica
      responses:
        '200':
          description: Dettaglio
    put:
      summary: Modifica torneo
      responses:
        '200':
          description: Modificato
    delete:
      summary: Elimina torneo
      responses:
        '200':
          description: Eliminato
  /tournaments/{id}/matches:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Collega partita, turno e data
      responses:
        '201':
          description: Collegata
  /tournaments/{id}/ranking:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Classifica torneo
      responses:
        '200':
          description: Classifica
  /statistics/global:
    get:
      summary: Statistiche globali, medie e dati per tipo di gioco
      responses:
        '200':
          description: Statistiche
  /statistics/local:
    get:
      summary: Statistiche del locale, medie e dati per tipo di gioco
      responses:
        '200':
          description: Statistiche
  /statistics/client:
    get:
      summary: Statistiche personali, percentuale vittorie e media punti
      responses:
        '200':
          description: Statistiche
  /statistics/ranking:
    get:
      summary: Classifica globale con vittorie, percentuale e media punti
      responses:
        '200':
          description: Classifica
  /actuators/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    put:
      summary: Modifica configurazione attuatore
      responses:
        '200':
          description: Modificato
    delete:
      summary: Elimina attuatore
      responses:
        '200':
          description: Eliminato
