<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Edge locale</title><style>body{font-family:Arial;max-width:900px;margin:30px auto;padding:0 16px;background:#f4f7fb;color:#172033}section{background:white;border-radius:12px;padding:18px;margin:14px 0;box-shadow:0 5px 20px #dce3ee}button{padding:10px 14px;margin:4px;border:0;border-radius:8px;background:#275efe;color:white}button.off{background:#b42318}pre{background:#111827;color:#d1fae5;padding:15px;border-radius:8px;overflow:auto}.row{display:flex;gap:8px;flex-wrap:wrap}input{padding:9px}</style></head><body><h1>Interfaccia locale Edge</h1><p>Questa pagina continua a funzionare nel locale e mostra coda offline e attuatori.</p><section><div class="row"><button onclick="connection(true)">Vai online</button><button class="off" onclick="connection(false)">Simula offline</button><button onclick="load()">Aggiorna</button></div></section><section><h2>Stato</h2><pre id="state">Caricamento...</pre></section><section><h2>Evento manuale</h2><div class="row"><input id="match" placeholder="Match ID" value="1"><input id="game" placeholder="Game ID" value="1"><select id="event"><option>MATCH_START</option><option>GOAL_PLAYER_1</option><option>GOAL_PLAYER_2</option><option>MATCH_END</option></select><button onclick="sendEvent()">Invia</button></div></section><script>async function load(){document.querySelector('#state').textContent=JSON.stringify(await fetch('/state').then(r=>r.json()),null,2)}async function connection(online){await fetch('/connection',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({online})});load()}async function sendEvent(){await fetch('/events',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({match_id:+match.value,game_id:+game.value,event_type:event.value,locale_id:1,device_id:1})});load()}load();setInterval(load,3000)</script></body></html>
